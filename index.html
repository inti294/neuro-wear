<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroWear</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #000000, #1e3a8a, #ffffff);
    min-height: 100vh;
    animation: fadeIn 1s ease;
}

/* ANIMACIÓN GENERAL */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* HEADER */
header {
    position: relative;
    text-align: center;
    padding: 40px;
}

/* TÍTULO NEÓN */
.logo {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #60a5fa;
    text-shadow:
        0 0 5px #60a5fa,
        0 0 10px #60a5fa,
        0 0 20px #3b82f6,
        0 0 40px #2563eb;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow:
            0 0 5px #60a5fa,
            0 0 10px #60a5fa;
    }
    to {
        text-shadow:
            0 0 10px #93c5fd,
            0 0 20px #60a5fa,
            0 0 40px #2563eb;
    }
}

/* LOGIN ICON */
#loginIcon {
    position: absolute;
    right: 30px;
    top: 40px;
    font-size: 24px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

#loginIcon:hover {
    transform: scale(1.3) rotate(10deg);
    color: #60a5fa;
}

/* PRODUCT GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* PRODUCT CARD */
.product {
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(30px);}
    to {opacity:1; transform: translateY(0);}
}

.product:hover {
    transform: translateY(-10px) scale(1.05);
}

.product img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.product h3 {
    margin: 10px 0;
    color: #0f172a;
}

.product p {
    color: #2563eb;
    font-weight: bold;
}

/* BUTTONS */
button {
    margin-top: 8px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    transition: 0.2s;
}

.btn-add {
    background: #2563eb;
    color: white;
}

.btn-add:hover {
    transform: scale(1.1);
}

.btn-remove {
    background: #ef4444;
    color: white;
    margin-left: 5px;
}

/* CART */
#cart {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 260px;
    max-height: 300px;
    background: rgba(255,255,255,0.95);
    padding: 15px;
    border-radius: 15px;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: slideUp 0.6s ease;
}

@keyframes slideUp {
    from {transform: translateY(100px); opacity:0;}
    to {transform: translateY(0); opacity:1;}
}

#cart ul {
    list-style: none;
    padding: 0;
}

#cart li {
    font-size: 14px;
    margin-bottom: 8px;
}

.total {
    font-weight: bold;
    margin-top: 10px;
    text-align: center;
}

.btn-buy {
    width: 100%;
    background: #16a34a;
    color: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">NEUROWEAR</div>
    <i class="fas fa-user" id="loginIcon" onclick="login()"></i>
</header>

<div class="container" id="products"></div>

<div id="cart">
    <h3>🛒 Cart</h3>
    <ul id="cartList"></ul>
    <div class="total">Total: $<span id="total">0</span></div>
    <button class="btn-buy" onclick="buy()">Buy</button>
</div>

<script>
const products = [
    {name:"Smart T-Shirt", price:180000, image:"camisa.jpg"},
    {name:"Smart Socks", price:90000, image:"calcetines.avif"},
    {name:"Smart Watch", price:1500000, image:"relog.webp"},
    {name:"Cardiac Patch", price:220000, image:"parche.jpg"},
    {name:"Smart Gloves", price:150000, image:"guantes.webp"}
];

let cart = [];

function showProducts(){
    const container=document.getElementById("products");
    container.innerHTML="";
    products.forEach((p,i)=>{
        container.innerHTML+=`
        <div class="product">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>$${p.price.toLocaleString()}</p>
            <button class="btn-add" onclick="add(${i})">Add</button>
        </div>`;
    });
}

function add(i){
    cart.push(products[i]);
    updateCart();
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
}

function updateCart(){
    const list=document.getElementById("cartList");
    const total=document.getElementById("total");
    list.innerHTML="";
    let sum=0;

    cart.forEach((p,i)=>{
        list.innerHTML+=`
        <li>
        ${p.name} - $${p.price.toLocaleString()}
        <button class="btn-remove" onclick="removeItem(${i})">X</button>
        </li>`;
        sum+=p.price;
    });

    total.innerText=sum.toLocaleString();
}

function buy(){
    if(cart.length===0){
        alert("Cart is empty");
    }else{
        alert("Purchase successful 🛍️");
        cart=[];
        updateCart();
    }
}

function login(){
    alert("Login feature coming soon 🔐");
}

showProducts();
</script>

</body>
</html>
